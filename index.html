<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rugby Strength</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080808;--surface:#101010;--card:#171717;--border:#252525;--accent:#B8FF57;--accent-dim:rgba(184,255,87,.12);--text:#EFEFEF;--muted:#5A5A5A;--muted2:#888;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow:hidden;}
#app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:20px;padding-top:0;}
.screen::-webkit-scrollbar{display:none;}
.bnav{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;padding:env(safe-area-inset-top,10px) 0 10px;z-index:100;}
.nbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:9px;font-weight:600;cursor:pointer;letter-spacing:.08em;text-transform:uppercase;padding:4px 0;}
.nbtn.active{color:var(--accent);}
.nbtn svg{width:20px;height:20px;stroke-width:1.8;}
.home-hdr{padding:88px 22px 16px;display:flex;justify-content:space-between;align-items:flex-start;}
.app-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.05em;line-height:1;}
.app-sub{font-size:11px;color:var(--muted2);font-weight:500;margin-top:2px;}
.streak-badge{background:var(--accent-dim);border:1px solid rgba(184,255,87,.35);border-radius:14px;padding:10px 16px;text-align:center;}
.streak-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);line-height:1;}
.streak-lbl{font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;opacity:.8;}
.sched-bar{margin:0 22px 14px;background:var(--card);border-radius:14px;padding:14px 18px;border:1px solid var(--border);display:flex;align-items:center;gap:12px;}
.sched-icon{font-size:20px;}
.sched-text{font-size:12px;color:var(--muted2);line-height:1.5;}
.sched-text strong{color:var(--text);font-weight:600;}
.phase-bar{margin:0 22px 14px;background:var(--card);border-radius:18px;padding:18px 20px;border:1px solid var(--border);}
.phase-tag{font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.14em;margin-bottom:5px;}
.phase-title{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:.03em;margin-bottom:12px;}
.week-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.week-txt{font-size:11px;color:var(--muted2);}
.week-dots{display:flex;gap:6px;flex:1;margin-left:12px;}
.wdot{flex:1;height:4px;border-radius:2px;background:var(--border);}
.wdot.done{background:var(--accent);}
.wdot.cur{background:var(--accent);opacity:.45;}
.workout-card{margin:0 22px 16px;background:var(--card);border-radius:18px;padding:22px;border:1px solid var(--border);}
.wcard-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.wcard-lbl{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.dur-badge{font-size:11px;font-weight:500;color:var(--muted2);background:var(--surface);padding:4px 10px;border-radius:20px;border:1px solid var(--border);}
.ex-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:18px;}
.ex-chip{font-size:10px;font-weight:500;color:var(--muted2);background:var(--surface);padding:4px 10px;border-radius:20px;}
.start-btn{width:100%;background:var(--accent);color:#080808;border:none;border-radius:14px;padding:17px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;cursor:pointer;transition:transform .12s,opacity .12s;}
.start-btn:active{transform:scale(.97);opacity:.88;}
.wo-screen{height:100%;display:flex;flex-direction:column;overflow:hidden;}
.wo-topbar{padding:20px 22px 0;display:flex;align-items:center;gap:14px;flex-shrink:0;}
.wo-progress-track{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.wo-progress-fill{height:100%;background:var(--accent);border-radius:2px;transition:width .4s ease;}
.quit-btn{background:none;border:none;color:var(--muted2);cursor:pointer;padding:4px;display:flex;}
.quit-btn svg{width:20px;height:20px;stroke-width:2;}
.wo-label-row{padding:10px 22px 0;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.wo-section{font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.16em;}
.wo-counter{font-size:11px;color:var(--muted2);}
.wo-main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 24px 4px;min-height:0;overflow:hidden;}
.wo-name{font-family:'Bebas Neue',sans-serif;font-size:32px;text-align:center;line-height:1.05;letter-spacing:.02em;margin-bottom:3px;}
.wo-desc{font-size:11px;color:var(--muted2);text-align:center;max-width:270px;line-height:1.5;margin-bottom:8px;}
.wo-illus-row{display:flex;gap:14px;margin-bottom:8px;flex-shrink:0;align-items:flex-end;}
.wo-illus-box{display:flex;flex-direction:column;align-items:center;gap:3px;}
.wo-illus-box svg{width:72px;height:auto;opacity:.88;}
.illus-tag{font-size:8px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.ring-wrap{position:relative;width:140px;height:140px;margin-bottom:10px;flex-shrink:0;}
.ring-wrap svg{width:100%;height:100%;}
.ring-track{fill:none;stroke:var(--border);stroke-width:8;}
.ring-fill{fill:none;stroke:var(--accent);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.ring-txt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ring-sec{font-family:'Bebas Neue',sans-serif;font-size:50px;color:var(--text);line-height:1;}
.ring-lbl{font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;}
.reps-circle{width:140px;height:140px;border-radius:50%;background:var(--card);border:8px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0;}
.reps-num{font-family:'Bebas Neue',sans-serif;font-size:58px;color:var(--accent);line-height:1;}
.reps-lbl{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.rest-title{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--muted2);letter-spacing:.22em;text-align:center;margin-bottom:4px;}
.next-up{font-size:12px;color:var(--muted2);text-align:center;margin-bottom:12px;}
.next-up strong{color:var(--text);font-weight:600;}
.wo-ctrls{padding:0 22px 22px;flex-shrink:0;}
.done-btn{width:100%;background:var(--accent);color:#080808;border:none;border-radius:14px;padding:15px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;cursor:pointer;transition:transform .12s;margin-bottom:10px;}
.done-btn:active{transform:scale(.97);}
.pause-btn{width:100%;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:14px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:8px;}
.skip-btn{width:100%;background:none;color:var(--muted2);border:none;padding:8px;font-size:12px;font-weight:500;cursor:pointer;}
.complete-wrap{padding:88px 22px 24px;}
.complete-icon{width:60px;height:60px;background:var(--accent-dim);border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:14px;border:1px solid rgba(184,255,87,.3);}
.complete-icon svg{width:28px;height:28px;stroke:var(--accent);stroke-width:2.5;}
.complete-title{font-family:'Bebas Neue',sans-serif;font-size:50px;letter-spacing:.03em;margin-bottom:4px;line-height:1;}
.complete-sub{font-size:13px;color:var(--muted2);margin-bottom:28px;}
.sec-lbl{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.12em;margin-bottom:10px;}
.rating-row{display:flex;gap:8px;margin-bottom:20px;}
.rbtn{flex:1;background:var(--card);border:2px solid var(--border);border-radius:12px;padding:11px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:border-color .18s,background .18s;}
.rbtn.sel{border-color:var(--accent);background:var(--accent-dim);}
.rbtn-em{font-size:20px;}
.rbtn-tx{font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.05em;}
.note-inp{width:100%;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;resize:none;outline:none;transition:border-color .2s;margin-bottom:20px;}
.note-inp:focus{border-color:rgba(184,255,87,.5);}
.note-inp::placeholder{color:var(--muted);}
.save-btn{width:100%;background:var(--accent);color:#080808;border:none;border-radius:14px;padding:17px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.1em;cursor:pointer;transition:transform .12s;}
.save-btn:active{transform:scale(.97);}
.page-hdr{padding:88px 22px 16px;}
.page-title{font-family:'Bebas Neue',sans-serif;font-size:42px;letter-spacing:.04em;}
.page-sub{font-size:12px;color:var(--muted2);margin-top:3px;}
.view-toggle{display:flex;gap:8px;margin:0 22px 14px;}
.vt-btn{flex:1;padding:9px;border-radius:10px;border:1px solid var(--border);background:var(--card);color:var(--muted2);font-size:12px;font-weight:600;cursor:pointer;transition:all .18s;}
.vt-btn.active{background:var(--accent-dim);border-color:rgba(184,255,87,.4);color:var(--accent);}
.cal-wrap{padding:0 22px 20px;}
.cal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.cal-month{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.03em;}
.cal-nav{background:none;border:none;color:var(--muted2);font-size:20px;cursor:pointer;padding:4px 12px;line-height:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.cal-day-lbl{text-align:center;font-size:9px;font-weight:600;color:var(--muted2);text-transform:uppercase;padding:4px 0;}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:12px;font-weight:500;color:var(--muted2);}
.cal-day.today{color:var(--text);font-weight:700;}
.cal-day.has-workout{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(184,255,87,.35);font-weight:700;}
.cal-day.other-month{opacity:.25;}
.sess-list{padding:0 22px;display:flex;flex-direction:column;gap:10px;}
.sess-card{background:var(--card);border-radius:14px;padding:15px 17px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;}
.sess-em{font-size:22px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;background:var(--surface);border-radius:10px;flex-shrink:0;}
.sess-info{flex:1;min-width:0;}
.sess-date{font-weight:600;font-size:13px;margin-bottom:2px;}
.sess-meta{font-size:11px;color:var(--muted2);}
.sess-note{font-size:11px;color:var(--muted2);font-style:italic;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.empty-st{text-align:center;padding:60px 24px;color:var(--muted2);}
.empty-ic{font-size:48px;margin-bottom:12px;}
.empty-tx{font-size:14px;line-height:1.6;}
.ex-ref-filters{display:flex;gap:8px;padding:0 22px 16px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.ex-ref-filters::-webkit-scrollbar{display:none;}
.filter-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted2);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .18s;flex-shrink:0;}
.filter-btn.active{background:var(--accent-dim);border-color:rgba(184,255,87,.4);color:var(--accent);}
.ex-ref-list{padding:0 22px;display:flex;flex-direction:column;gap:14px;margin-bottom:20px;}
.ex-ref-card{background:var(--card);border-radius:16px;padding:18px;border:1px solid var(--border);}
.ex-ref-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px;}
.ex-ref-name{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.03em;line-height:1.1;}
.ex-ref-phase{font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;margin-top:2px;}
.ex-ref-type{font-size:9px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;background:var(--surface);padding:3px 8px;border-radius:8px;border:1px solid var(--border);}
.ex-ref-desc{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:14px;}
.ex-ref-illus{display:flex;gap:20px;justify-content:center;align-items:flex-end;}
.ex-ref-illus-box{display:flex;flex-direction:column;align-items:center;gap:5px;}
.ex-ref-illus-box svg{width:95px;height:auto;}
.ex-ref-tag{font-size:9px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:.1em;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 22px 20px;}
.stat-card{background:var(--card);border-radius:14px;padding:16px;border:1px solid var(--border);}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--accent);line-height:1;margin-bottom:4px;}
.stat-lbl{font-size:10px;font-weight:600;color:var(--muted2);text-transform:uppercase;letter-spacing:.1em;}
.sect-div{padding:0 22px 10px;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.14em;}
.phases-list{padding:0 22px;display:flex;flex-direction:column;gap:8px;margin-bottom:20px;}
.ph-card{background:var(--card);border-radius:14px;padding:16px 18px;border:1px solid var(--border);}
.ph-card.locked{opacity:.38;}
.ph-card.current{border-color:rgba(184,255,87,.5);}
.ph-card-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.ph-card-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.03em;}
.ph-badge{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;padding:3px 9px;border-radius:20px;}
.badge-cur{background:var(--accent-dim);color:var(--accent);}
.badge-done{background:rgba(255,255,255,.05);color:var(--muted2);}
.badge-lock{background:rgba(255,255,255,.05);color:var(--muted2);}
.ph-meta{font-size:11px;color:var(--muted2);}
.reset-wrap{padding:0 22px 40px;}
.reset-btn{width:100%;background:none;border:1px solid var(--border);border-radius:12px;padding:13px;color:var(--muted2);font-size:13px;font-weight:500;cursor:pointer;}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.fade-in{animation:fadeUp .25s ease forwards;}
</style>
</head>
<body>
<div id="app">
  <div id="screen" class="screen"></div>
  <nav class="bnav" id="bnav">
    <button class="nbtn active" id="nb-home" onclick="navigate('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>Home
    </button>
    <button class="nbtn" id="nb-history" onclick="navigate('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>History

    </button>
  </nav>
</div>

const KS='rs_sessions',KD='rs_start';
function getSessions(){return JSON.parse(localStorage.getItem(KS)||'[]');}
function saveSessions(s){localStorage.setItem(KS,JSON.stringify(s));}
function getStartDate(){let d=localStorage.getItem(KD);if(!d){d=new Date().toISOString().split('T')[0];localStorage.setItem(KD,d);}return new Date(d+'T00:00:00');}
function getCurrentWeek(){const s=getStartDate(),n=new Date(),d=Math.floor((n-s)/(86400000));return Math.min(Math.floor(d/7)+1,24);}
function getPhase(w){return PHASES.find(p=>p.weeks.includes(w))||PHASES[PHASES.length-1];}
function getStreak(){const s=getSessions();if(!s.length)return 0;const dates=[...new Set(s.map(x=>x.date))].sort().reverse();const today=new Date().toISOString().split('T')[0];const yest=new Date(Date.now()-86400000).toISOString().split('T')[0];if(dates[0]!==today&&dates[0]!==yest)return 0;let st=1;for(let i=1;i<dates.length;i++){const a=new Date(dates[i-1]+'T00:00:00'),b=new Date(dates[i]+'T00:00:00');if((a-b)===86400000)st++;else break;}return st;}
function getBestStreak(){const s=getSessions();if(!s.length)return 0;const dates=[...new Set(s.map(x=>x.date))].sort();let best=1,cur=1;for(let i=1;i<dates.length;i++){const a=new Date(dates[i-1]+'T00:00:00'),b=new Date(dates[i]+'T00:00:00');if((b-a)===86400000){cur++;best=Math.max(best,cur);}else cur=1;}return best;}

function buildSteps(phase){
  const steps=[];
  phase.warmup.forEach(ex=>steps.push({...ex,section:'warmup',sectionLabel:'Warm Up',round:0,id:steps.length}));
  for(let r=1;r<=phase.rounds;r++){
    const lbl=`Round ${r} of ${phase.rounds}`;
    phase.circuit.forEach((ex,i)=>{
      steps.push({...ex,section:'circuit',sectionLabel:lbl,round:r,id:steps.length});
      if(i<phase.circuit.length-1)steps.push({type:'rest',duration:phase.restEx,section:'circuit',sectionLabel:lbl,round:r,isRound:false,nextName:phase.circuit[i+1].name,id:steps.length});
    });
    if(r<phase.rounds)steps.push({type:'rest',duration:phase.restRound,section:'circuit',sectionLabel:`Round ${r} complete`,round:r,isRound:true,nextName:phase.circuit[0].name,id:steps.length});
  }
  phase.cooldown.forEach(ex=>steps.push({...ex,section:'cooldown',sectionLabel:'Cool Down',round:0,id:steps.length}));
  return steps;
}

let actx=null;
function getCtx(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function beep(f,d,v=0.2){try{const c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.setValueAtTime(v,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.start();o.stop(c.currentTime+d);}catch(e){}}
function beepTick(){beep(440,.1);}
function beepDone(){beep(880,.15);setTimeout(()=>beep(1100,.25),160);}

let wo=null,pendingSession=null;
function startWorkout(){const w=getCurrentWeek(),ph=getPhase(w),steps=buildSteps(ph);wo={steps,stepIndex:0,timer:0,interval:null,isPaused:false,startTime:Date.now(),phase:ph,week:w};showWo();}
function showWo(){document.getElementById('bnav').style.display='none';const sc=document.getElementById('screen');sc.style.paddingBottom='0';sc.style.overflow='hidden';renderWorkout();}
function quitWorkout(){if(wo&&wo.interval)clearInterval(wo.interval);wo=null;document.getElementById('bnav').style.display='flex';const sc=document.getElementById('screen');sc.style.paddingBottom='20px';sc.style.overflow='auto';navigate(currentView);}
function advanceStep(){if(!wo)return;if(wo.interval){clearInterval(wo.interval);wo.interval=null;}wo.stepIndex++;if(wo.stepIndex>=wo.steps.length){finishWorkout();return;}renderWorkout();initStep();}
function initStep(){if(!wo)return;const s=wo.steps[wo.stepIndex];if(s.type==='timed'||s.type==='rest'){wo.timer=s.duration;startTimer();}}
function startTimer(){if(!wo)return;if(wo.interval)clearInterval(wo.interval);wo.interval=setInterval(()=>{if(wo.isPaused)return;wo.timer--;if(wo.timer<=3&&wo.timer>0)beepTick();updateTimerDOM();if(wo.timer<=0){clearInterval(wo.interval);wo.interval=null;beepDone();setTimeout(advanceStep,600);}},1000);}
function togglePause(){if(!wo)return;wo.isPaused=!wo.isPaused;const btn=document.getElementById('pause-btn');if(btn)btn.textContent=wo.isPaused?'▶  Resume':'⏸  Pause';}
function updateTimerDOM(){if(!wo)return;const step=wo.steps[wo.stepIndex],total=step.duration;const secEl=document.getElementById('ring-sec'),fillEl=document.getElementById('ring-fill');if(secEl)secEl.textContent=wo.timer;if(fillEl){const c=440,p=Math.max(0,wo.timer/total);fillEl.setAttribute('stroke-dashoffset',(c*(1-p)).toFixed(2));}}
function finishWorkout(){const dur=Math.round((Date.now()-wo.startTime)/60000);pendingSession={phase:wo.phase.id,week:wo.week,duration:dur,date:new Date().toISOString().split('T')[0],rating:2};wo=null;document.getElementById('bnav').style.display='none';const sc=document.getElementById('screen');sc.style.paddingBottom='0';sc.style.overflow='auto';renderComplete();}
function saveSession(){if(!pendingSession)return;const sessions=getSessions();sessions.unshift(pendingSession);saveSessions(sessions);pendingSession=null;document.getElementById('bnav').style.display='flex';const sc=document.getElementById('screen');sc.style.paddingBottom='20px';navigate('home');}

let currentView='home',histMode='list',exFilter='all';
let calYear=new Date().getFullYear(),calMonth=new Date().getMonth();

function navigate(view){if(wo)return;currentView=view;['home','history','exercises','progress'].forEach(v=>{const el=document.getElementById('nb-'+v);if(el)el.classList.toggle('active',v===view);});if(view==='home')renderHome();else if(view==='history')renderHistory();else if(view==='exercises')renderExercises();else if(view==='progress')renderProgress();}

function renderHome(){const week=getCurrentWeek(),phase=getPhase(week),streak=getStreak();const wip=phase.weeks.indexOf(week)+1;const chips=phase.circuit.slice(0,4).map(e=>`<span class="ex-chip">${e.name}</span>`).join('');const dots=phase.weeks.map((_,i)=>{let c='wdot';if(i<wip-1)c+=' done';else if(i===wip-1)c+=' cur';return`<div class="${c}"></div>`;}).join('');document.getElementById('screen').innerHTML=`<div class="fade-in"><div class="home-hdr"><div><div class="app-title">Rugby<br>Strength</div><div class="app-sub">6-Month Home Programme</div></div><div class="streak-badge"><div class="streak-num">${streak}</div><div class="streak-lbl">Day streak</div></div></div><div class="sched-bar"><div class="sched-icon">📅</div><div class="sched-text"><strong>Mon–Thu</strong> morning &nbsp;·&nbsp; <strong>Fri</strong> rest &nbsp;·&nbsp; <strong>Sat</strong> rugby &nbsp;·&nbsp; <strong>Sun</strong> rest</div></div><div class="phase-bar"><div class="phase-tag">Phase ${phase.id} of 6</div><div class="phase-title">${phase.name}</div><div class="week-row"><span class="week-txt">Week ${wip} of 4</span><div class="week-dots">${dots}</div></div></div><div class="workout-card"><div class="wcard-hdr"><span class="wcard-lbl">Today's Workout</span><span class="dur-badge">${phase.duration}</span></div><div class="ex-chips">${chips}<span class="ex-chip">+more</span></div><button class="start-btn" onclick="startWorkout()">Start Workout</button></div></div>`;}

function renderWorkout(){if(!wo)return;const step=wo.steps[wo.stepIndex],total=wo.steps.length,idx=wo.stepIndex;const progress=((idx)/total*100).toFixed(1);const ill=getIllus(step.name);let illustHTML='';if(ill&&step.type!=='rest'){illustHTML=`<div class="wo-illus-row"><div class="wo-illus-box"><span class="illus-tag">Start</span>${ill.s}</div><div class="wo-illus-box"><span class="illus-tag">End</span>${ill.e}</div></div>`;}let mainHTML='';if(step.type==='rest'){mainHTML=`<div class="rest-title">${step.isRound?'ROUND COMPLETE':'REST'}</div><div class="next-up">Next: <strong>${step.nextName||'Cool Down'}</strong></div><div class="ring-wrap"><svg viewBox="0 0 165 165"><circle class="ring-track" cx="82" cy="82" r="70" transform="rotate(-90 82 82)"/><circle id="ring-fill" class="ring-fill" cx="82" cy="82" r="70" stroke-dasharray="440" stroke-dashoffset="0" transform="rotate(-90 82 82)"/></svg><div class="ring-txt"><span id="ring-sec" class="ring-sec">${wo.timer||step.duration}</span><span class="ring-lbl">sec</span></div></div>`;}else if(step.type==='timed'){mainHTML=`<div class="wo-name">${step.name}</div><div class="wo-desc">${step.desc}</div>${illustHTML}<div class="ring-wrap"><svg viewBox="0 0 165 165"><circle class="ring-track" cx="82" cy="82" r="70" transform="rotate(-90 82 82)"/><circle id="ring-fill" class="ring-fill" cx="82" cy="82" r="70" stroke-dasharray="440" stroke-dashoffset="0" transform="rotate(-90 82 82)"/></svg><div class="ring-txt"><span id="ring-sec" class="ring-sec">${step.duration}</span><span class="ring-lbl">sec</span></div></div>`;}else{mainHTML=`<div class="wo-name">${step.name}</div><div class="wo-desc">${step.desc}</div>${illustHTML}<div class="reps-circle"><div class="reps-num">${step.reps}</div><div class="reps-lbl">reps</div></div>`;}const isReps=step.type==='reps';document.getElementById('screen').innerHTML=`<div class="wo-screen"><div class="wo-topbar"><div class="wo-progress-track"><div class="wo-progress-fill" style="width:${progress}%"></div></div><button class="quit-btn" onclick="confirmQuit()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button></div><div class="wo-label-row"><span class="wo-section">${step.sectionLabel}</span><span class="wo-counter">${idx+1}/${total}</span></div><div class="wo-main">${mainHTML}</div><div class="wo-ctrls">${isReps?`<button class="done-btn" onclick="advanceStep()">Done ✓</button>`:''}${!isReps?`<button id="pause-btn" class="pause-btn" onclick="togglePause()">${wo.isPaused?'▶  Resume':'⏸  Pause'}</button>`:''}<button class="skip-btn" onclick="advanceStep()">Skip →</button></div></div>`;if(!isReps&&wo.timer===0)initStep();else if(!isReps&&wo.timer>0){updateTimerDOM();if(!wo.interval)startTimer();}}
function confirmQuit(){if(confirm('Quit this workout? Progress will be lost.'))quitWorkout();}

function renderComplete(){if(!pendingSession)return;document.getElementById('screen').innerHTML=`<div class="complete-wrap fade-in"><div class="complete-icon"><svg viewBox="0 0 24 24" fill="none"><polyline points="20,6 9,17 4,12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg></div><div class="complete-title">Session<br>Done</div><div class="complete-sub">Phase ${pendingSession.phase} · Week ${pendingSession.week} · ${pendingSession.duration} min</div><div class="sec-lbl">How did it feel?</div><div class="rating-row">${[['😊','Easy',1],['💪','Solid',2],['🔥','Tough',3],['💀','Brutal',4]].map(([em,tx,v])=>`<button class="rbtn${pendingSession.rating===v?' sel':''}" onclick="setRating(${v})"><span class="rbtn-em">${em}</span><span class="rbtn-tx">${tx}</span></button>`).join('')}</div><div class="sec-lbl">Notes (optional)</div><textarea class="note-inp" id="ni" rows="3" placeholder="How did the session go?"></textarea><button class="save-btn" onclick="doSave()">Save Session</button></div>`;}
function setRating(v){if(!pendingSession)return;pendingSession.rating=v;document.querySelectorAll('.rbtn').forEach((b,i)=>b.classList.toggle('sel',i===v-1));}
function doSave(){if(!pendingSession)return;pendingSession.note=document.getElementById('ni')?.value?.trim()||'';saveSession();}

const EM=['😊','💪','🔥','💀'],RT=['Easy','Solid','Tough','Brutal'];
const DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});}
function renderHistory(){const sessions=getSessions();document.getElementById('screen').innerHTML=`<div class="fade-in"><div class="page-hdr"><div class="page-title">History</div><div class="page-sub">${sessions.length} session${sessions.length!==1?'s':''} logged</div></div><div class="view-toggle"><button class="vt-btn${histMode==='list'?' active':''}" onclick="setHistMode('list')">List</button><button class="vt-btn${histMode==='cal'?' active':''}" onclick="setHistMode('cal')">Calendar</button></div>${histMode==='cal'?renderCalendar(sessions):renderSessList(sessions)}</div>`;}
function setHistMode(m){histMode=m;renderHistory();}
function renderSessList(sessions){if(!sessions.length)return`<div class="empty-st"><div class="empty-ic">🏉</div><div class="empty-tx">No sessions yet.<br>Complete your first workout to get started.</div></div>`;return`<div class="sess-list">${sessions.map(s=>{const ph=PHASES.find(p=>p.id===s.phase);return`<div class="sess-card"><div class="sess-em">${EM[(s.rating||2)-1]}</div><div class="sess-info"><div class="sess-date">${fmtDate(s.date)}</div><div class="sess-meta">Phase ${s.phase} ${ph?ph.name:''} · Week ${s.week} · ${s.duration||'?'} min · ${RT[(s.rating||2)-1]}</div>${s.note?`<div class="sess-note">${s.note}</div>`:''}</div></div>`;}).join('')}</div>`;}
function renderCalendar(sessions){const workoutDates=new Set(sessions.map(s=>s.date));const today=new Date().toISOString().split('T')[0];const firstDay=new Date(calYear,calMonth,1);const lastDay=new Date(calYear,calMonth+1,0);const startDow=firstDay.getDay();let cells='';for(let i=0;i<startDow;i++)cells+=`<div class="cal-day other-month"></div>`;for(let d=1;d<=lastDay.getDate();d++){const dStr=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;cells+=`<div class="cal-day${workoutDates.has(dStr)?' has-workout':dStr===today?' today':''}">${d}</div>`;}const hdrs=DAYS.map(d=>`<div class="cal-day-lbl">${d[0]}</div>`).join('');return`<div class="cal-wrap"><div class="cal-hdr"><button class="cal-nav" onclick="calPrev()">‹</button><div class="cal-month">${MONTHS[calMonth]} ${calYear}</div><button class="cal-nav" onclick="calNext()">›</button></div><div class="cal-grid">${hdrs}${cells}</div></div>`;}
function calPrev(){calMonth--;if(calMonth<0){calMonth=11;calYear--;}renderHistory();}
function calNext(){calMonth++;if(calMonth>11){calMonth=0;calYear++;}renderHistory();}

function getAllExercises(){const seen=new Set(),result=[];PHASES.forEach(ph=>{['warmup','circuit','cooldown'].forEach(sec=>{ph[sec].forEach(ex=>{if(!seen.has(ex.name)){seen.add(ex.name);const inPhases=PHASES.filter(p=>['warmup','circuit','cooldown'].some(s=>p[s].some(e=>e.name===ex.name))).map(p=>p.id);const inSections=new Set();PHASES.forEach(p=>['warmup','circuit','cooldown'].forEach(s=>{if(p[s].some(e=>e.name===ex.name))inSections.add(s);}));result.push({...ex,phases:inPhases,sections:[...inSections]});}});});});return result;}
function renderExercises(){const all=getAllExercises();const filters=[{key:'all',label:'All'},{key:'warmup',label:'Warm Up'},{key:'circuit',label:'Circuit'},{key:'cooldown',label:'Cool Down'}];const filterHTML=filters.map(f=>`<button class="filter-btn${exFilter===f.key?' active':''}" onclick="setExFilter('${f.key}')">${f.label}</button>`).join('');let filtered=exFilter==='all'?all:all.filter(ex=>ex.sections.includes(exFilter));const cards=filtered.map(ex=>{const ill=getIllus(ex.name);const phTag=ex.phases.length===6?'All phases':`Phase${ex.phases.length>1?'s':''} ${ex.phases.join(', ')}`;const typeLabel=ex.sections.includes('circuit')?'Circuit':ex.sections.includes('warmup')?'Warm Up':'Cool Down';const illustHTML=ill?`<div class="ex-ref-illus"><div class="ex-ref-illus-box"><span class="ex-ref-tag">Start</span>${ill.s}</div><div class="ex-ref-illus-box"><span class="ex-ref-tag">End</span>${ill.e}</div></div>`:'';return`<div class="ex-ref-card"><div class="ex-ref-top"><div><div class="ex-ref-name">${ex.name}</div><div class="ex-ref-phase">${phTag}</div></div><div class="ex-ref-type">${typeLabel}</div></div><div class="ex-ref-desc">${ex.desc}</div>${illustHTML}</div>`;}).join('');document.getElementById('screen').innerHTML=`<div class="fade-in"><div class="page-hdr"><div class="page-title">Exercises</div><div class="page-sub">${filtered.length} exercises</div></div><div class="ex-ref-filters">${filterHTML}</div><div class="ex-ref-list">${cards}</div></div>`;}
function setExFilter(f){exFilter=f;renderExercises();}

function renderProgress(){const sessions=getSessions(),streak=getStreak(),best=getBestStreak(),week=getCurrentWeek();const total=sessions.length;const now=new Date(),sow=new Date(now);sow.setDate(now.getDate()-now.getDay());const thisWeek=sessions.filter(s=>new Date(s.date+'T00:00:00')>=sow).length;const phCards=PHASES.map(p=>{const cur=p.weeks.includes(week),done=week>p.weeks[p.weeks.length-1],unlocked=week>=p.weeks[0];let bc='badge-lock',bt='Locked';if(done){bc='badge-done';bt='✓ Done';}else if(cur){bc='badge-cur';bt='● Current';}return`<div class="ph-card${cur?' current':''}${!unlocked?' locked':''}"><div class="ph-card-hdr"><span class="ph-card-name">Phase ${p.id} — ${p.name}</span><span class="ph-badge ${bc}">${bt}</span></div><div class="ph-meta">Weeks ${p.weeks[0]}–${p.weeks[p.weeks.length-1]} · ${p.circuit.length} exercises · ${p.rounds} rounds · ${p.duration}</div></div>`;}).join('');document.getElementById('screen').innerHTML=`<div class="fade-in"><div class="page-hdr"><div class="page-title">Progress</div><div class="page-sub">Week ${week} of 24 · ${Math.round(week/24*100)}% complete</div></div><div class="stats-grid"><div class="stat-card"><div class="stat-num">${total}</div><div class="stat-lbl">Total Sessions</div></div><div class="stat-card"><div class="stat-num">${streak}</div><div class="stat-lbl">Day Streak</div></div><div class="stat-card"><div class="stat-num">${best}</div><div class="stat-lbl">Best Streak</div></div><div class="stat-card"><div class="stat-num">${thisWeek}</div><div class="stat-lbl">This Week</div></div></div><div class="sect-div">Programme Phases</div><div class="phases-list">${phCards}</div><div class="reset-wrap"><button class="reset-btn" onclick="resetProgramme()">↺  Reset Programme & All Data</button></div></div>`;}
function resetProgramme(){if(!confirm('This will delete all sessions and reset your start date. Are you sure?'))return;localStorage.removeItem(KS);localStorage.removeItem(KD);getStartDate();navigate('home');}

navigate('home');
</script>
